name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (Python 3.14)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check src tests

      - name: Pytest
        run: pytest -q

  package-smoke:
    name: Package smoke (uv build + clean install)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Build sdist and wheel
        run: uv build

      - name: Clean-env install from local wheel
        run: |
          uv venv .venv-smoke
          source .venv-smoke/bin/activate
          uv pip install --upgrade pip
          uv pip install dist/*.whl
          python -c "from xgic.gitlab.graphql import GitLabClient, GitLabConfig; print(GitLabClient, GitLabConfig)"

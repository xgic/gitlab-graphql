name: Bug report
description: Report a problem with the GitLab GraphQL client library
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Questions belong in [Discussions](https://github.com/xgic/gitlab-graphql/discussions).
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce / minimal example
  - type: input
    id: version
    attributes:
      label: Package / Python version
  - type: checkboxes
    id: safety
    attributes:
      label: Public safety
      options:
        - label: This report does not include private hosts, private tracker IDs, internal paths, or secrets
          required: true
